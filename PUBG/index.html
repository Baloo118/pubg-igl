<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>PUBG IGL — Вход</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Share+Tech+Mono&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#07090c;--s1:#0d1117;--s2:#161b22;--b1:#252d3a;--ac:#00e5a0;--tx:#dde3ee;--tx2:#7a8899;--danger:#ff4040;--r:8px}
html,body{height:100%;background:var(--bg);color:var(--tx);font-family:'Inter',sans-serif;display:flex;align-items:center;justify-content:center}
.wrap{width:380px;max-width:92vw;text-align:center}
.logo{font-family:'Rajdhani',sans-serif;font-size:36px;font-weight:700;letter-spacing:4px;color:var(--ac);margin-bottom:4px}
.logo span{color:var(--tx2);font-weight:500}
.sub{font-size:11px;color:var(--tx2);letter-spacing:2px;text-transform:uppercase;margin-bottom:40px}
.card{background:var(--s1);border:1px solid var(--b1);border-radius:12px;padding:32px}
.field{margin-bottom:16px;text-align:left}
.lbl{font-size:11px;color:var(--tx2);font-family:'Rajdhani',sans-serif;font-weight:600;letter-spacing:2px;text-transform:uppercase;margin-bottom:6px;display:block}
.inp{width:100%;padding:11px 14px;background:var(--s2);border:1px solid var(--b1);border-radius:var(--r);color:var(--tx);font-family:'Share Tech Mono',monospace;font-size:13px;outline:none;transition:border-color .15s}
.inp:focus{border-color:var(--ac)}
.inp::placeholder{color:#3a4556}
.btn{width:100%;padding:13px;background:linear-gradient(135deg,rgba(0,229,160,.18),rgba(0,229,160,.06));border:1px solid var(--ac);border-radius:var(--r);color:var(--ac);font-family:'Rajdhani',sans-serif;font-size:15px;font-weight:700;letter-spacing:3px;cursor:pointer;transition:all .2s;margin-top:8px}
.btn:hover{background:linear-gradient(135deg,rgba(0,229,160,.28),rgba(0,229,160,.12));box-shadow:0 0 24px rgba(0,229,160,.2)}
.err{color:var(--danger);font-size:12px;margin-top:10px;min-height:18px;text-align:center}
.hint{font-size:11px;color:var(--tx2);margin-top:20px;line-height:1.6}
/* scan line effect */
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,229,160,.015) 2px,rgba(0,229,160,.015) 4px);pointer-events:none;z-index:0}
.wrap{position:relative;z-index:1}
</style>
<script src="config.js"></script>
</head>
<body>
<div class="wrap">
  <div class="logo">PUBG <span>//</span> IGL</div>
  <div class="sub">Тренерский инструмент</div>
  <div class="card">
    <div class="field">
      <label class="lbl" for="pwd">Пароль команды</label>
      <input class="inp" id="pwd" type="password" placeholder="••••••••" autocomplete="current-password" />
    </div>
    <button class="btn" onclick="login()">ВОЙТИ →</button>
    <div class="err" id="err"></div>
  </div>
  <div class="hint">Доступ только для членов команды<br><span id="teamNameHint"></span></div>
</div>
<script>
document.getElementById('teamNameHint').textContent = CONFIG.TEAM_NAME;
document.getElementById('pwd').addEventListener('keydown', e => { if(e.key==='Enter') login(); });

// Check if already logged in
if(sessionStorage.getItem('igl_auth')==='1') location.href='dashboard.html';

function login(){
  const val = document.getElementById('pwd').value;
  if(val === CONFIG.TEAM_PASSWORD){
    sessionStorage.setItem('igl_auth','1');
    location.href='dashboard.html';
  } else {
    document.getElementById('err').textContent='Неверный пароль';
    document.getElementById('pwd').value='';
    document.getElementById('pwd').focus();
  }
}
</script>
</body>
</html>
