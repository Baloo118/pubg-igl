<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>PUBG IGL — Вход</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Share+Tech+Mono&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#07090c;--s1:#0d1117;--s2:#161b22;--b1:#252d3a;--ac:#00e5a0;--tx:#dde3ee;--tx2:#7a8899;--danger:#ff4040;--r:8px}
html,body{height:100%;background:var(--bg);color:var(--tx);font-family:'Inter',sans-serif;display:flex;align-items:center;justify-content:center}
.wrap{width:400px;max-width:92vw;text-align:center}
.logo{font-family:'Rajdhani',sans-serif;font-size:36px;font-weight:700;letter-spacing:4px;color:var(--ac);margin-bottom:4px}
.logo span{color:var(--tx2);font-weight:500}
.sub{font-size:11px;color:var(--tx2);letter-spacing:2px;text-transform:uppercase;margin-bottom:40px}
.card{background:var(--s1);border:1px solid var(--b1);border-radius:12px;padding:32px}
.field{margin-bottom:16px;text-align:left}
.lbl{font-size:11px;color:var(--tx2);font-family:'Rajdhani',sans-serif;font-weight:600;letter-spacing:2px;text-transform:uppercase;margin-bottom:6px;display:block}
.inp{width:100%;padding:11px 14px;background:var(--s2);border:1px solid var(--b1);border-radius:var(--r);color:var(--tx);font-family:'Share Tech Mono',monospace;font-size:13px;outline:none;transition:border-color .15s}
.inp:focus{border-color:var(--ac)}
.inp::placeholder{color:#3a4556}
.btn{width:100%;padding:13px;background:linear-gradient(135deg,rgba(0,229,160,.18),rgba(0,229,160,.06));border:1px solid var(--ac);border-radius:var(--r);color:var(--ac);font-family:'Rajdhani',sans-serif;font-size:15px;font-weight:700;letter-spacing:3px;cursor:pointer;transition:all .2s;margin-top:8px}
.btn:hover{background:linear-gradient(135deg,rgba(0,229,160,.28),rgba(0,229,160,.12));box-shadow:0 0 24px rgba(0,229,160,.2)}
.err{color:var(--danger);font-size:12px;margin-top:10px;min-height:18px;text-align:center}
.hint{font-size:11px;color:var(--tx2);margin-top:20px;line-height:1.6}
.setup-note{background:rgba(0,229,160,.07);border:1px solid rgba(0,229,160,.2);border-radius:var(--r);padding:12px;margin-bottom:16px;font-size:11px;color:var(--ac);line-height:1.7;text-align:left}
</style>
</head>
<body>
<div class="wrap">
  <div class="logo">PUBG <span>//</span> IGL</div>
  <div class="sub">Тренерский инструмент</div>
  <div class="card">
    <div id="setupNote" class="setup-note" style="display:none">
      ⚙️ Заполни настройки ниже для первого входа
    </div>
    <div class="field">
      <label class="lbl" for="pwd">Пароль команды</label>
      <input class="inp" id="pwd" type="password" placeholder="Введи пароль" autocomplete="current-password" />
    </div>
    <button class="btn" onclick="login()">ВОЙТИ →</button>
    <div class="err" id="err"></div>
  </div>
  <div class="hint">Доступ только для членов команды<br><span id="teamNameHint" style="color:var(--ac)"></span></div>

  <!-- НАСТРОЙКИ — заполняются один раз -->
  <div style="margin-top:24px;background:var(--s1);border:1px solid var(--b1);border-radius:12px;padding:20px;text-align:left" id="settingsPanel">
    <div style="font-family:'Rajdhani',sans-serif;font-size:12px;font-weight:700;letter-spacing:2px;color:var(--tx2);margin-bottom:14px">⚙ НАСТРОЙКИ КОМАНДЫ</div>
    <div class="field">
      <label class="lbl">Новый пароль</label>
      <input class="inp" id="cfgPwd" placeholder="Придумай пароль" />
    </div>
    <div class="field">
      <label class="lbl">Название команды</label>
      <input class="inp" id="cfgName" placeholder="No Pattern" />
    </div>
    <div class="field">
      <label class="lbl">Никнеймы игроков (через запятую)</label>
      <input class="inp" id="cfgPlayers" placeholder="Cnok0uHbluKz, Игрок2, Игрок3, Игрок4" />
    </div>
    <div class="field">
      <label class="lbl">PUBG API Ключ</label>
      <input class="inp" id="cfgApi" placeholder="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..." />
    </div>
    <div class="field">
      <label class="lbl">Регион</label>
      <select class="inp" id="cfgShard" style="cursor:pointer">
        <option value="steam">PC Global (steam)</option>
        <option value="kakao">KR/JP (kakao)</option>
        <option value="psn">PS4</option>
        <option value="xbox">Xbox</option>
      </select>
    </div>
    <button class="btn" onclick="saveSettings()" style="margin-top:4px">СОХРАНИТЬ НАСТРОЙКИ</button>
    <div class="err" id="cfgErr" style="color:var(--ac)"></div>
  </div>
</div>

<script>
// Настройки хранятся в localStorage браузера
function getConfig(){
  try{ return JSON.parse(localStorage.getItem('igl_config'))||null; }catch(e){ return null; }
}

function init(){
  const cfg = getConfig();
  if(cfg){
    document.getElementById('settingsPanel').style.display='none';
    document.getElementById('teamNameHint').textContent = cfg.TEAM_NAME||'';
    // Pre-fill settings
    document.getElementById('cfgPwd').value = cfg.TEAM_PASSWORD||'';
    document.getElementById('cfgName').value = cfg.TEAM_NAME||'';
    document.getElementById('cfgPlayers').value = (cfg.PLAYERS||[]).join(', ');
    document.getElementById('cfgApi').value = cfg.API_KEY||'';
    document.getElementById('cfgShard').value = cfg.SHARD||'steam';
  } else {
    document.getElementById('settingsPanel').style.display='block';
    document.getElementById('setupNote').style.display='block';
  }
  if(sessionStorage.getItem('igl_auth')==='1') location.href='dashboard.html';
}

function login(){
  const cfg = getConfig();
  if(!cfg){ document.getElementById('err').textContent='Сначала сохрани настройки ниже'; return; }
  const val = document.getElementById('pwd').value;
  if(val === cfg.TEAM_PASSWORD){
    sessionStorage.setItem('igl_auth','1');
    sessionStorage.setItem('igl_config', JSON.stringify(cfg));
    location.href='dashboard.html';
  } else {
    document.getElementById('err').textContent='Неверный пароль';
    document.getElementById('pwd').value='';
    document.getElementById('pwd').focus();
  }
}

function saveSettings(){
  const pwd = document.getElementById('cfgPwd').value.trim();
  const name = document.getElementById('cfgName').value.trim();
  const players = document.getElementById('cfgPlayers').value.split(',').map(s=>s.trim()).filter(Boolean);
  const api = document.getElementById('cfgApi').value.trim();
  const shard = document.getElementById('cfgShard').value;
  if(!pwd){ document.getElementById('cfgErr').textContent='Введи пароль'; return; }
  if(!players.length){ document.getElementById('cfgErr').textContent='Введи никнеймы'; return; }
  const cfg = { TEAM_PASSWORD:pwd, TEAM_NAME:name||'Команда', PLAYERS:players, API_KEY:api, SHARD:shard };
  localStorage.setItem('igl_config', JSON.stringify(cfg));
  document.getElementById('cfgErr').textContent='✓ Сохранено! Теперь войди с паролем выше.';
  document.getElementById('cfgErr').style.color='var(--ac)';
  document.getElementById('teamNameHint').textContent = cfg.TEAM_NAME;
  document.getElementById('settingsPanel').style.display='none';
}

document.addEventListener('DOMContentLoaded', init);
document.getElementById('pwd').addEventListener('keydown', e=>{ if(e.key==='Enter') login(); });
</script>
</body>
</html>
